{% extends 'core/base.html' %}

{% block content %}
<div class="card">
    <h2>Konfiguration bearbeiten (Guild: {{ guild_id }})</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Speichern</button>
        <a href="{% url 'dashboard_home' %}" class="btn btn-secondary">Abbrechen</a>
    </form>
</div>
{% endblock %}
